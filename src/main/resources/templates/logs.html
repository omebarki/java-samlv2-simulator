<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Exchange Logs</title>
</head>
<body>
<div layout:fragment="content">
    <h2><i class="bi bi-journal-text"></i> SAML Exchange Logs</h2>
    <hr/>

    <div th:if="${#lists.isEmpty(logs)}" class="alert alert-info">
        No exchanges logged yet.
    </div>

    <div class="accordion" id="logAccordion" th:unless="${#lists.isEmpty(logs)}">
        <div class="accordion-item" th:each="log, iterStat : ${logs}">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button"
                        data-bs-toggle="collapse" th:data-bs-target="'#log-' + ${log.id}">
                    <span class="badge bg-info me-2" th:text="${log.flowType}"></span>
                    <small th:text="${log.timestamp}" class="me-2"></small>
                    <span th:text="${log.profileName}" class="me-2"></span>
                    <small class="text-muted" th:text="${log.spEntityId}"></small>
                </button>
            </h2>
            <div th:id="'log-' + ${log.id}" class="accordion-collapse collapse">
                <div class="accordion-body">
                    <div class="row">
                        <div class="col-md-6">
                            <strong>ACS URL:</strong> <code th:text="${log.acsUrl}"></code><br/>
                            <strong>NameID:</strong> <span th:text="${log.nameId}"></span><br/>
                            <strong>RelayState:</strong> <span th:text="${log.relayState ?: 'none'}"></span>
                        </div>
                    </div>
                    <div th:if="${log.samlRequest}" class="mt-3">
                        <h6>SAML Request:</h6>
                        <pre class="bg-dark text-light p-3 rounded" style="max-height:300px;overflow:auto"
                             th:text="${log.samlRequest}"></pre>
                    </div>
                    <div th:if="${log.samlResponse}" class="mt-3">
                        <h6>SAML Response:</h6>
                        <pre class="bg-dark text-light p-3 rounded" style="max-height:300px;overflow:auto"
                             th:text="${log.samlResponse}"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
