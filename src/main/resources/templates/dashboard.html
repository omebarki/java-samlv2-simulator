<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Dashboard</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row">
        <div class="col-12">
            <h2><i class="bi bi-speedometer2"></i> Dashboard</h2>
            <hr/>
        </div>
    </div>

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Profiles quick launch -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-gear"></i> Configuration Profiles</h5>
                    <a th:href="@{/profiles/new}" class="btn btn-sm btn-primary">
                        <i class="bi bi-plus-circle"></i> New Profile
                    </a>
                </div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(profiles)}" class="text-muted">
                        No profiles configured yet. <a th:href="@{/profiles/new}">Create one</a> to get started.
                    </div>
                    <div class="table-responsive" th:unless="${#lists.isEmpty(profiles)}">
                        <table class="table table-hover mb-0">
                            <thead>
                            <tr>
                                <th>Profile</th>
                                <th>SP Entity ID</th>
                                <th>ACS URL</th>
                                <th>NameID</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="profile : ${profiles}">
                                <td th:text="${profile.profileName}"></td>
                                <td><code th:text="${profile.spEntityId}"></code></td>
                                <td><small th:text="${profile.acsUrl}"></small></td>
                                <td th:text="${profile.nameId}"></td>
                                <td>
                                    <a th:href="@{/sso/idp-init/{id}(id=${profile.id})}"
                                       class="btn btn-sm btn-success" title="IdP-Initiated SSO">
                                        <i class="bi bi-send"></i> Send SSO
                                    </a>
                                    <a th:href="@{/profiles/{id}/edit(id=${profile.id})}"
                                       class="btn btn-sm btn-outline-secondary" title="Edit">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Recent logs -->
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-journal-text"></i> Recent Exchanges</h5>
                    <a th:href="@{/logs}" class="btn btn-sm btn-outline-secondary">View All</a>
                </div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(recentLogs)}" class="text-muted">
                        No SAML exchanges logged yet.
                    </div>
                    <div class="table-responsive" th:unless="${#lists.isEmpty(recentLogs)}">
                        <table class="table table-sm table-hover mb-0">
                            <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Flow</th>
                                <th>Profile</th>
                                <th>SP Entity ID</th>
                                <th>NameID</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="log : ${recentLogs}">
                                <td><small th:text="${log.timestamp}"></small></td>
                                <td><span class="badge bg-info" th:text="${log.flowType}"></span></td>
                                <td th:text="${log.profileName}"></td>
                                <td><small th:text="${log.spEntityId}"></small></td>
                                <td th:text="${log.nameId}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
