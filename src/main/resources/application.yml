server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/saml-simulator
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: true
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

saml:
  simulator:
    base-url: http://localhost:8080
    default-entity-id: https://simulator.example.com/idp
